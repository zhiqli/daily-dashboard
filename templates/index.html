<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日面板</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="dashboard">

  <!-- 天气 + 地点 -->
  <div class="card weather-card">
    <div class="weather-main">
      <span class="weather-emoji" id="weather-emoji">☀️</span>
      <div class="weather-info">
        <div class="weather-location" id="weather-location">深圳·宝安</div>
        <div class="weather-temp" id="weather-temp">--°C</div>
        <div class="weather-meta" id="weather-meta">加载中…</div>
      </div>
    </div>
  </div>

  <!-- 名言 -->
  <div class="card">
    <div class="quote-text" id="quote-text">加载中…</div>
    <div class="quote-author" id="quote-author"></div>
  </div>

  <!-- Todo -->
  <div class="card" id="todos-panel">
    <div class="section-label">今日待办</div>
    <ul id="todo-list" class="todo-list">
      <li class="empty-state">加载中…</li>
    </ul>
  </div>

</div>
<script src="/static/app.js"></script>
</body>
</html>
